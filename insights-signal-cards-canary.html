<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insights - Signal Cards Canary</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      .screen-shell {
        min-height: 100vh;
        padding: var(--spacing-container-padding, 24px);
      }
      .screen-header {
        width: min(960px, 100%);
        margin: 0 auto 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }
      .screen-header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
      }
      .screen-nav {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .screen-nav a {
        text-decoration: none;
        color: var(--color-on-surface-variant, #45464d);
        font-weight: 600;
      }
      .screen-nav a[aria-current="page"] {
        color: var(--color-primary, #000000);
        text-decoration: underline;
      }
      .controls-bar {
        width: min(960px, 100%);
        margin: 0 auto 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }
      .controls-bar input,
      .controls-bar select {
        padding: 10px 12px;
        border: 1px solid var(--color-outline-variant, #c6c6cd);
        border-radius: var(--radius-DEFAULT, 0.125rem);
        font-size: 13px;
        background: var(--color-surface-container-lowest, #ffffff);
      }
      .controls-bar input {
        flex: 1 1 220px;
        min-width: 180px;
      }
      .summary-grid {
        width: min(960px, 100%);
        margin: 0 auto 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }
      .summary-card {
        background: var(--color-surface-container-lowest, #ffffff);
        border: 1px solid var(--color-outline-variant, #c6c6cd);
        border-radius: var(--radius-lg, 0.25rem);
        padding: 16px;
        text-align: center;
      }
      .summary-card h2 {
        margin: 0 0 8px;
        font-size: 13px;
        font-weight: 600;
        color: var(--color-on-surface-variant, #45464d);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .summary-card .value {
        font-size: 32px;
        font-weight: 700;
        color: var(--color-on-background, #1b1b1d);
      }
      .record-list {
        width: min(960px, 100%);
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .record-row {
        background: var(--color-surface-container-lowest, #ffffff);
        border: 1px solid var(--color-outline-variant, #c6c6cd);
        border-radius: var(--radius-lg, 0.25rem);
        padding: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .record-title {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 600;
      }
      .record-meta {
        font-size: 12px;
        color: var(--color-on-surface-variant, #45464d);
        text-transform: capitalize;
      }
      .insight-type-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: var(--radius-DEFAULT, 0.125rem);
        background: var(--color-surface-container-low, #f6f3f5);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .empty-state {
        width: min(960px, 100%);
        margin: 0 auto;
        padding: 40px;
        text-align: center;
        color: var(--color-on-surface-variant, #45464d);
        border: 1px dashed var(--color-outline-variant, #c6c6cd);
        border-radius: var(--radius-lg, 0.25rem);
      }
      .record-count {
        margin-left: auto;
        font-size: 13px;
        color: var(--color-on-surface-variant, #45464d);
      }
    </style>
  </head>
  <body>
    <div class="screen-shell" data-setfarm-root="insights" data-testid="insights-screen">
      <header class="screen-header">
        <h1>Insights</h1>
        <nav class="screen-nav" aria-label="Section navigation">
          <a href="record-operations-signal-cards-canary.html" data-action-id="ACT_OPERATIONS">Operations</a>
          <a href="insights-signal-cards-canary.html" aria-current="page" data-action-id="ACT_INSIGHTS">Insights</a>
          <a href="index.html" data-action-id="ACT_TECHNICAL_STATUS">Technical Status</a>
        </nav>
      </header>

      <section class="summary-grid" aria-label="Insights summary">
        <article class="summary-card" data-testid="summary-total">
          <h2>Total Records</h2>
          <div class="value" data-testid="insights-total-records">0</div>
        </article>
        <article class="summary-card" data-testid="summary-open">
          <h2>Open</h2>
          <div class="value" data-testid="insights-open-records">0</div>
        </article>
        <article class="summary-card" data-testid="summary-severe">
          <h2>Severe</h2>
          <div class="value" data-testid="insights-severe-records">0</div>
        </article>
      </section>

      <section class="controls-bar">
        <button type="button" class="btn btn-primary" data-action-id="ACT_CREATE_RECORD" data-testid="create-record">Create Record</button>
        <input
          type="text"
          placeholder="Filter insights..."
          aria-label="Filter insights"
          data-action-id="ACT_FILTER_INSIGHTS"
          data-testid="filter-insights-input"
        />
        <select data-filter-id="insights-status" aria-label="Filter by status" data-testid="insights-status-filter">
          <option value="">All statuses</option>
          <option value="open">Open</option>
          <option value="acknowledged">Acknowledged</option>
          <option value="resolved">Resolved</option>
        </select>
        <select data-filter-id="insights-severity" aria-label="Filter by severity" data-testid="insights-severity-filter">
          <option value="">All severities</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <select data-filter-id="insights-type" aria-label="Filter by type" data-testid="insights-type-filter">
          <option value="">All types</option>
          <option value="anomaly">Anomaly</option>
          <option value="performance">Performance</option>
          <option value="infrastructure">Infrastructure</option>
          <option value="security">Security</option>
        </select>
        <button type="button" class="btn btn-ghost" data-action-id="insights-clear-filters" data-testid="insights-clear-filters">Clear Filters</button>
        <button type="button" class="btn btn-secondary" data-action-id="ACT_EXPORT_SUMMARY" data-testid="export-summary">Export Summary</button>
        <span class="record-count" data-testid="insights-record-count"></span>
      </section>

      <section class="record-list" data-testid="insights-record-list" aria-live="polite"></section>

      <section class="empty-state" data-testid="insights-empty-state" style="display: none;">
        <p>No records match the current filters.</p>
      </section>
    </div>

    <script src="assets/js/us-002/act_create_record.js" defer></script>
    <script src="assets/js/us-003/act_filter_insights.js" defer></script>
    <script src="assets/js/us-003/act_export_summary.js" defer></script>
  </body>
</html>
