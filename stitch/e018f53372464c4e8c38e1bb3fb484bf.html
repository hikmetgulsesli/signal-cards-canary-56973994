<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Signal Cards Canary - Create Record</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#ffb95f",
                    "on-secondary-fixed-variant": "#004395",
                    "tertiary-container": "#2a1700",
                    "surface-variant": "#e4e2e4",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#45464d",
                    "surface-container-lowest": "#ffffff",
                    "surface-dim": "#dcd9db",
                    "on-tertiary-container": "#b87500",
                    "on-primary-fixed-variant": "#3f465c",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#fefcff",
                    "on-primary-fixed": "#131b2e",
                    "surface-tint": "#565e74",
                    "on-surface": "#1b1b1d",
                    "surface-container-highest": "#e4e2e4",
                    "on-tertiary-fixed": "#2a1700",
                    "secondary": "#0058be",
                    "inverse-primary": "#bec6e0",
                    "secondary-fixed": "#d8e2ff",
                    "surface-container-low": "#f6f3f5",
                    "primary-fixed-dim": "#bec6e0",
                    "inverse-on-surface": "#f3f0f2",
                    "primary": "#000000",
                    "surface-container-high": "#eae7e9",
                    "surface-bright": "#fcf8fa",
                    "error-container": "#ffdad6",
                    "inverse-surface": "#303032",
                    "on-error": "#ffffff",
                    "primary-container": "#131b2e",
                    "on-background": "#1b1b1d",
                    "secondary-fixed-dim": "#adc6ff",
                    "surface-container": "#f0edef",
                    "on-error-container": "#93000a",
                    "tertiary": "#000000",
                    "outline-variant": "#c6c6cd",
                    "on-primary-container": "#7c839b",
                    "tertiary-fixed": "#ffddb8",
                    "on-primary": "#ffffff",
                    "outline": "#76777d",
                    "background": "#fcf8fa",
                    "primary-fixed": "#dae2fd",
                    "on-secondary-fixed": "#001a42",
                    "surface": "#fcf8fa",
                    "secondary-container": "#2170e4",
                    "on-tertiary-fixed-variant": "#653e00",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "stack-gap-normal": "16px",
                    "gutter": "12px",
                    "container-padding": "24px",
                    "cell-padding-v": "10px",
                    "unit": "4px",
                    "cell-padding-h": "12px",
                    "stack-gap-dense": "8px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "label-caps": ["Inter"],
                    "display-lg": ["Inter"],
                    "data-mono": ["JetBrains Mono"],
                    "display-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "body-sm": ["Inter"]
            },
            "fontSize": {
                    "headline": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "data-mono": ["13px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "display-sm": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex items-center justify-center p-container-padding">
<!-- TopNavBar: Suppressed as this is a transactional "Create Record" screen -> Intent Fallback: Suppress Nav Shell -->
<!-- SideNavBar: Suppressed for linear task -->
<!-- Main Content Canvas (Focused Form View) -->
<main class="w-full max-w-2xl">
<!-- Unsaved Changes Banner -->
<div class="bg-surface-container-highest border border-outline-variant rounded mb-stack-gap-normal p-cell-padding-h flex items-center gap-gutter" role="alert">
<span aria-hidden="true" class="material-symbols-outlined text-secondary" data-icon="info">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant flex-1">You have unsaved changes.</p>
</div>
<!-- Form Container -->
<div class="bg-surface-container-lowest border border-surface-dim rounded shadow-sm overflow-hidden">
<!-- Header -->
<div class="px-container-padding py-stack-gap-normal border-b border-surface-dim bg-surface-bright flex items-center justify-between">
<div>
<h1 class="font-display-sm text-display-sm text-primary">Create Record</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-unit">Enter details for the new signal record.</p>
</div>
<button aria-label="Close form" class="text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Form Body -->
<form action="#" class="p-container-padding space-y-stack-gap-normal" id="recordForm" method="POST">
<!-- Field: Title (Required with Error State) -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface mb-unit" for="recordTitle">
                        Title <span aria-hidden="true" class="text-error">*</span>
</label>
<div class="relative">
<input aria-describedby="titleError" aria-invalid="true" class="w-full bg-surface-container-lowest border-error text-on-surface font-body-md rounded focus:ring-2 focus:ring-error focus:border-error block px-cell-padding-h py-cell-padding-v" id="recordTitle" name="recordTitle" placeholder="e.g., Q3 Metric Anomaly" type="text"/>
<div class="absolute inset-y-0 right-0 pr-cell-padding-h flex items-center pointer-events-none">
<span class="material-symbols-outlined text-error" data-icon="error">error</span>
</div>
</div>
<p class="mt-unit font-body-sm text-body-sm text-error flex items-center gap-1" id="titleError">
                        Title is required to create a record.
                    </p>
</div>
<!-- Field Grid: Counter Type & Initial Value -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-gap-normal">
<!-- Field: Counter Type -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface mb-unit" for="counterType">
                            Counter Type <span aria-hidden="true" class="text-error">*</span>
</label>
<div class="relative">
<select class="w-full bg-surface-container-lowest border-outline-variant text-on-surface font-body-md rounded focus:ring-2 focus:ring-secondary focus:border-secondary block px-cell-padding-h py-cell-padding-v appearance-none" id="counterType" name="counterType">
<option disabled="" selected="" value="">Select counter type</option>
<option value="blue">Blue (Primary Metric)</option>
<option value="amber">Amber (Warning Metric)</option>
<option value="emerald">Emerald (Success Metric)</option>
<option value="red">Red (Critical Metric)</option>
</select>
<div class="absolute inset-y-0 right-0 pr-cell-padding-h flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
<p class="mt-unit font-body-sm text-body-sm text-on-surface-variant">Determines the visual accent color.</p>
</div>
<!-- Field: Initial Value -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface mb-unit" for="initialValue">
                            Initial Value <span aria-hidden="true" class="text-error">*</span>
</label>
<input class="w-full bg-surface-container-lowest border-outline-variant text-on-surface font-data-mono text-data-mono rounded focus:ring-2 focus:ring-secondary focus:border-secondary block px-cell-padding-h py-cell-padding-v" id="initialValue" name="initialValue" placeholder="0" type="number" value="0"/>
<p class="mt-unit font-body-sm text-body-sm text-on-surface-variant">Starting numeric value for the counter.</p>
</div>
</div>
<!-- Field: Description (Optional) -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface mb-unit flex justify-between" for="description">
                        Description
                        <span class="text-on-surface-variant font-normal">Optional</span>
</label>
<textarea class="w-full bg-surface-container-lowest border-outline-variant text-on-surface font-body-md rounded focus:ring-2 focus:ring-secondary focus:border-secondary block px-cell-padding-h py-cell-padding-v resize-y" id="description" name="description" placeholder="Add contextual details about this record..." rows="3"></textarea>
</div>
</form>
<!-- Footer Actions -->
<div class="px-container-padding py-stack-gap-normal bg-surface-container-low border-t border-surface-dim flex items-center justify-end gap-gutter">
<button class="px-stack-gap-normal py-cell-padding-v font-label-caps text-label-caps text-on-surface-variant bg-transparent border border-outline-variant rounded hover:bg-surface-container-highest transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-1" type="button">
                    Cancel
                </button>
<button class="px-stack-gap-normal py-cell-padding-v font-label-caps text-label-caps text-on-primary bg-primary border border-transparent rounded hover:bg-surface-tint transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-1 flex items-center gap-1 shadow-sm" form="recordForm" type="submit">
<span class="material-symbols-outlined text-[16px]" data-icon="save" data-weight="fill" style="font-variation-settings: 'FILL' 1;">save</span>
                    Save Record
                </button>
</div>
</div>
</main>
</body></html>
