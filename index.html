<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signal Cards Canary</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main data-setfarm-root="baseline" data-testid="setfarm-app-root" class="app-shell"></main>
    <script src="assets/js/signal-cards-canary.state.js" defer></script>
    <script src="assets/js/signal-cards-canary.storage.js" defer></script>
    <script src="assets/js/app.js" defer></script>
    <script src="assets/js/test-bridge.js" defer></script>
    <script>
      (function () {
        function addStoryNav() {
          const root = document.querySelector('[data-setfarm-root="baseline"]');
          if (!root || root.dataset.storyNavAdded) return;

          const nav = document.createElement('nav');
          nav.className = 'global-actions';
          nav.setAttribute('data-testid', 'story-nav');
          nav.innerHTML =
            '<a href="record-operations-signal-cards-canary.html" class="btn btn-secondary" data-action-id="ACT_OPERATIONS">Record Operations</a>' +
            '<a href="insights-signal-cards-canary.html" class="btn btn-secondary" data-action-id="ACT_INSIGHTS">Insights</a>' +
            '<a href="record-editor-signal-cards-canary.html" class="btn btn-secondary" data-action-id="ACT_CREATE_RECORD">Create Record</a>';
          root.appendChild(nav);
          root.dataset.storyNavAdded = 'true';
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', addStoryNav);
        } else {
          addStoryNav();
        }
      })();
    </script>
  </body>
</html>
